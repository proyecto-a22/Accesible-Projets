<script>

/* audio */

let audioCtx = null

function activarAudio(){

if(audioCtx) return

audioCtx = new (window.AudioContext || window.webkitAudioContext)()

}

function sonido(freq,dur,vol){

if(!audioCtx) return

let osc = audioCtx.createOscillator()
let gain = audioCtx.createGain()

osc.frequency.value = freq
gain.gain.value = vol

osc.connect(gain)
gain.connect(audioCtx.destination)

osc.start()

setTimeout(()=>osc.stop(),dur)

}

function clickUI(){
sonido(650,50,0.04)
}

/* activar audio con interacción */

["keydown","click","touchstart","pointerdown"].forEach(ev=>{
document.addEventListener(ev,activarAudio,{once:true})
})

/* menú */

let btn = document.getElementById("menuBtn")
let lista = document.getElementById("menuLista")

btn.onclick = ()=>{

let abierto = btn.getAttribute("aria-expanded") === "true"

if(abierto){

lista.style.display="none"
btn.textContent="Menú contraído"
btn.setAttribute("aria-expanded","false")

}else{

lista.style.display="block"
btn.textContent="Menú expandido"
btn.setAttribute("aria-expanded","true")

}

clickUI()

}

/* reloj */

function actualizarReloj(){

let ahora=new Date()

let h=String(ahora.getHours()).padStart(2,"0")
let m=String(ahora.getMinutes()).padStart(2,"0")

document.getElementById("hora").textContent =
"Hora: "+h+":"+m

document.getElementById("fecha").textContent =
ahora.toLocaleDateString()

}

setInterval(actualizarReloj,60000)
actualizarReloj()

/* clima */

fetch("https://wttr.in/?format=3")

.then(r=>r.text())

.then(t=>{
document.getElementById("clima").textContent=t
})
.catch(()=>{
document.getElementById("clima").textContent="Clima no disponible"
})

</script>
